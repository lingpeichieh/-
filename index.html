<!DOCTYPE html>

<head>

    <title>醫護縮寫 187 題終極練習 App</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; touch-action: manipulation; }
        .perspective { perspective: 1200px; }
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            height: 250px;
        }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            border-radius: 1.5rem;
            position: absolute;
            inset: 0;
            background: white;
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }
        .card-back { transform: rotateY(180deg); background-color: #eff6ff; color: #1d4ed8; border-color: #dbeafe; }
        .progress-bar { transition: width 0.5s ease-out; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4">

    <div class="w-full max-w-md mb-8">

            </div>
            <div class="bg-white px-4 py-2 rounded-2xl shadow-sm border border-slate-100">

            </div>
        </div>
        <div class="w-full bg-slate-200 rounded-full h-2">
            <div id="progress" class="progress-bar bg-blue-600 h-2 rounded-full" style="width: 0.5%"></div>
        </div>
    </div>

    <div class="w-full max-w-md perspective mb-10">
        <div id="card" class="card-inner relative">
            <div class="card-face card-front">

                <div class="absolute bottom-6 text-slate-300 text-[10px] font-bold tracking-[0.3em]">TAP TO FLIP</div>
            </div>
            <div class="card-face card-back">

                <div class="absolute bottom-6 text-blue-300 text-[10px] font-bold tracking-[0.3em]">ANSWER</div>
            </div>
        </div>
    </div>

    <div class="w-full max-w-md grid grid-cols-2 gap-4">
        <button id="wrong" class="bg-white border-2 border-slate-100 py-6 rounded-3xl active:scale-95 transition-all shadow-sm">
            <span class="text-red-400 text-2xl font-bold">✕</span>
            <p class="text-[10px] text-slate-400 font-bold mt-1 uppercase">再練一次</p>
        </button>
        <button id="right" class="bg-white border-2 border-slate-100 py-6 rounded-3xl active:scale-95 transition-all shadow-sm">
            <span class="text-green-500 text-2xl font-bold">✓</span>
            <p class="text-[10px] text-slate-400 font-bold mt-1 uppercase">我學會了</p>

        ];

        let index = 0;
        let learnedCount = 0;

        function update() {
            const card = document.getElementById('card');
            card.classList.remove('is-flipped');
            
            setTimeout(() => {
                document.getElementById('question').textContent = rawData[index][0];
                document.getElementById('answer').textContent = rawData[index][1];
                document.getElementById('counter').textContent = `${(index + 1).toString().padStart(3, '0')} / ${rawData.length}`;
                document.getElementById('learned-tag').textContent = `✓ ${learnedCount}`;
                document.getElementById('progress').style.width = `${((index + 1) / rawData.length) * 100}%`;
            }, 100);
        }

        document.getElementById('card').onclick = () => document.getElementById('card').classList.toggle('is-flipped');

        document.getElementById('right').onclick = () => {
            learnedCount++;
            if (index < rawData.length - 1) { index++; update(); }
            else { alert("🎉 全數挑戰完成！你太棒了！"); }
        };

        document.getElementById('wrong').onclick = () => {
            if (index < rawData.length - 1) { index++; update(); }
            else { index = 0; update(); }
        };

        update();
    </script>
