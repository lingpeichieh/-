<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <title>醫護縮寫學習助手</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; touch-action: manipulation; }
        .perspective { perspective: 1000px; }
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            height: 220px;
        }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            border-radius: 1.5rem;
            position: absolute;
            inset: 0;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card-front { background: white; color: #1e293b; }
        .card-back { background: #eff6ff; color: #1d4ed8; transform: rotateY(180deg); }
        .progress-fill { transition: width 0.4s ease; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-5">

    <div class="w-full max-w-md mt-4">

        </div>
        <div class="w-full bg-slate-200 rounded-full h-2">

        </div>
    </div>

    <div class="w-full max-w-md mt-10 perspective">
        <div id="card" class="card-inner relative">
            <div class="card-face card-front">

                <div class="absolute bottom-6 text-slate-300 text-[10px] tracking-[0.2em] font-bold">點擊查看答案</div>
            </div>
            <div class="card-face card-back">
                <p id="answer" class="text-2xl font-black text-center leading-tight"></p>
                <div class="absolute bottom-6 text-blue-300 text-[10px] tracking-[0.2em] font-bold">正確答案</div>
            </div>
        </div>
    </div>

    <div class="w-full max-w-md grid grid-cols-2 gap-4 mt-10">
        <button id="btn-wrong" class="bg-white border-2 border-slate-100 py-5 rounded-2xl active:bg-red-50 active:border-red-200 transition-all group">
            <span class="block text-red-500 text-2xl mb-1 group-active:scale-110 transition-transform">✕</span>
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">還不熟</span>
        </button>
        <button id="btn-correct" class="bg-white border-2 border-slate-100 py-5 rounded-2xl active:bg-green-50 active:border-green-200 transition-all group">
            <span class="block text-green-500 text-2xl mb-1 group-active:scale-110 transition-transform">✓</span>
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">已學會</span>
        </button>
    </div>

    <div class="mt-auto mb-6 flex gap-8 items-center">
        <button id="prev" class="text-slate-300 hover:text-blue-500 font-black text-xs">PREV</button>
        <button id="restart" class="bg-slate-800 text-white px-6 py-2 rounded-full text-xs font-bold shadow-lg shadow-slate-200">重新開始</button>
        <button id="next" class="text-slate-300 hover:text-blue-500 font-black text-xs">NEXT</button>
    </div>

            ["縮寫「BPH」中的「P」代表 _____。", "prostatic (前列腺的)"],
            ["縮寫「Ca」在病歷中代表 _____。", "癌症 (cancer)"],
            ["縮寫「CAD」中的「A」代表 _____。", "artery (動脈)"],
            ["縮寫「CAPD」中的「A」代表 _____。", "ambulatory (可活動的)"],
            ["縮寫「CC」代表 _____ 檢查。", "心導管檢查 (cardiac catheterization)"],
            ["縮寫「CHF」中的「H」代表 _____。", "heart (心臟)"],
            ["縮寫「qd」全稱為 every day，縮寫「qod」則代表 _____。", "每隔一天 (every other day)"],
            ["縮寫「tid」是指一天給予 _____ 次。", "三 (three)"],
            ["給藥頻率「quarter in diem」的簡寫為 _____。", "qid"],
            ["縮寫「SOS」中的「O」代表 _____。", "one (一)"],
            ["縮寫「BSA」中的「S」代表 _____。", "surface (表面)"],
            ["縮寫「CBC」中的「B」代表 _____。", "blood (血液)"],
            ["縮寫「Ccr」中的「C」代表 _____。", "clearance (廓清)"],
            ["縮寫「CXR」中的「X」代表 _____。", "X-ray (X 光)"],
            ["縮寫「FBS」中的「F」代表 _____。", "fasting (空腹)"],
            ["縮寫「FFP」中的「F」代表 _____。", "fresh frozen (新鮮冷凍)"],
            ["縮寫「GCS」中的「C」代表 _____。", "coma (昏迷)"],
            ["縮寫「ICU」中的「I」代表 _____。", "intensive (加護的)"],
            ["縮寫「NPO」中的「O」代表 _____。", "os (口)"],
            ["縮寫「ROM」中的「M」代表 _____。", "motion (運動)"],
            ["縮寫「TPN」中的「N」代表 _____。", "nutrition (營養)"],
            ["縮寫「V/S」中的「V」代表 _____。", "vital (生命的)"]
        ];

        let index = 0;

        function update() {
            const card = document.getElementById('card');
            card.classList.remove('is-flipped');
            
            setTimeout(() => {
                document.getElementById('question').textContent = data[index][0];
                document.getElementById('answer').textContent = data[index][1];
                document.getElementById('stats').textContent = `${index + 1} / ${data.length}`;
                document.getElementById('progress-bar').style.width = `${((index + 1) / data.length) * 100}%`;
            }, 150);
        }

        document.getElementById('card').onclick = () => {
            document.getElementById('card').classList.toggle('is-flipped');
        };

        document.getElementById('btn-correct').onclick = () => {
            if (index < data.length - 1) {
                index++;
                update();
            } else {
                alert("恭喜！你已經完成所有題目的練習！");
            }
        };

        document.getElementById('btn-wrong').onclick = () => {
            if (index < data.length - 1) {
                index++;
                update();
            }
        };

        document.getElementById('next').onclick = () => {
            if (index < data.length - 1) {
                index++;
                update();
            }
        };

        document.getElementById('prev').onclick = () => {
            if (index > 0) {
                index--;
                update();
            }
        };

        document.getElementById('restart').onclick = () => {
            index = 0;
            update();
        };

        update();
    </script>
</body>
</html>
